<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="gv" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9D6EFF"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="gc" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="url(#gc)" stroke="url(#gv)" stroke-width="1.5" opacity="0.6"/>
  <!-- Neural network nodes -->
  <circle cx="24" cy="10" r="3" fill="url(#gv)" filter="url(#glow)"/>
  <circle cx="12" cy="20" r="3" fill="url(#gv)" filter="url(#glow)"/>
  <circle cx="36" cy="20" r="3" fill="url(#gv)" filter="url(#glow)"/>
  <circle cx="16" cy="34" r="3" fill="url(#gv)" filter="url(#glow)"/>
  <circle cx="32" cy="34" r="3" fill="url(#gv)" filter="url(#glow)"/>
  <circle cx="24" cy="24" r="4" fill="url(#gv)" filter="url(#glow)"/>
  <!-- Connection lines -->
  <line x1="24" y1="10" x2="12" y2="20" stroke="url(#gv)" stroke-width="1.2" opacity="0.6"/>
  <line x1="24" y1="10" x2="36" y2="20" stroke="url(#gv)" stroke-width="1.2" opacity="0.6"/>
  <line x1="12" y1="20" x2="24" y2="24" stroke="url(#gv)" stroke-width="1.2" opacity="0.7"/>
  <line x1="36" y1="20" x2="24" y2="24" stroke="url(#gv)" stroke-width="1.2" opacity="0.7"/>
  <line x1="24" y1="24" x2="16" y2="34" stroke="url(#gv)" stroke-width="1.2" opacity="0.6"/>
  <line x1="24" y1="24" x2="32" y2="34" stroke="url(#gv)" stroke-width="1.2" opacity="0.6"/>
  <line x1="12" y1="20" x2="16" y2="34" stroke="url(#gv)" stroke-width="1" opacity="0.4"/>
  <line x1="36" y1="20" x2="32" y2="34" stroke="url(#gv)" stroke-width="1" opacity="0.4"/>
</svg>
